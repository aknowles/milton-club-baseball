name: Update Baseball Calendar

on:
  schedule:
    # Once daily at 8 AM ET (UTC-4), March through July only — the active
    # season. Outside those months, use workflow_dispatch to run manually.
    - cron: '0 12 * 3-7 *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'config.json'
      - '.github/workflows/update-calendar.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytz

      - name: Fetch previous snapshot from Pages
        run: |
          mkdir -p calendars
          HTTP_CODE=$(curl -s -o calendars/snapshot.json -w "%{http_code}" \
            "https://aknowles.github.io/milton-club-baseball/calendars/snapshot.json") || true
          echo "Snapshot fetch HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: Snapshot fetch failed (HTTP $HTTP_CODE) — using empty snapshot"
            echo '{}' > calendars/snapshot.json
          fi
          SNAP_SIZE=$(wc -c < calendars/snapshot.json)
          echo "Snapshot file size: ${SNAP_SIZE} bytes"
          if [ "$SNAP_SIZE" -lt 10 ]; then
            echo "WARNING: Snapshot is suspiciously small (${SNAP_SIZE} bytes)"
          fi

      - name: Run scraper
        run: python scraper.py

      - name: Upload debug HTML (collapsed-event diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_html/
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove debug HTML before Pages deploy
        if: always()
        run: rm -rf debug_html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    needs: [scrape, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'workflow-failure',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Calendar update workflow failed',
                body: `Workflow run failed at ${new Date().toISOString()}\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['workflow-failure']
              });
            }
