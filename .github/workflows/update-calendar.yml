name: Update Baseball Calendar

on:
  schedule:
    # Twice daily: 8 AM and 8 PM ET
    - cron: '0 12 * * *'   # 8 AM ET (UTC-4)
    - cron: '0 0 * * *'    # 8 PM ET (UTC-4)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'config.json'
      - '.github/workflows/update-calendar.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytz

      - name: Run scraper
        run: python scraper.py

      - name: Check for changes
        id: changes
        run: |
          git add calendars/ index.html calendars/.snapshot.json .github/ISSUE_TEMPLATE/snack-signup.yml
          git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
          git reset HEAD

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendars/ index.html calendars/.snapshot.json .github/ISSUE_TEMPLATE/snack-signup.yml
          git commit -m "Update calendar $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    needs: [scrape, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'workflow-failure',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Calendar update workflow failed',
                body: `Workflow run failed at ${new Date().toISOString()}\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['workflow-failure']
              });
            }
