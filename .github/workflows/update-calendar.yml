name: Update Baseball Calendar

on:
  schedule:
    # Active season (March–June): four times daily at 6 AM, 11 AM, 4 PM,
    # and 10 PM ET (UTC-4).
    - cron: '0 10 * 3-6 *'
    - cron: '0 15 * 3-6 *'
    - cron: '0 20 * 3-6 *'
    - cron: '0 2 * 3-6 *'
    # Late summer (July–August): once daily at 8 AM ET.
    - cron: '0 12 * 7-8 *'
    # Off-season (September–February): three times weekly,
    # Mon/Wed/Fri at 8 AM ET.
    - cron: '0 12 * 9-12 1,3,5'
    - cron: '0 12 * 1-2 1,3,5'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'config.json'
      - '.github/workflows/update-calendar.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytz

      - name: Fetch previous snapshot from Pages
        run: |
          mkdir -p calendars
          HTTP_CODE=$(curl -s -o calendars/snapshot.json -w "%{http_code}" \
            "https://aknowles.github.io/milton-club-baseball/calendars/snapshot.json") || true
          echo "Snapshot fetch HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: Snapshot fetch failed (HTTP $HTTP_CODE) — using empty snapshot"
            echo '{}' > calendars/snapshot.json
          fi
          SNAP_SIZE=$(wc -c < calendars/snapshot.json)
          echo "Snapshot file size: ${SNAP_SIZE} bytes"
          if [ "$SNAP_SIZE" -lt 10 ]; then
            echo "WARNING: Snapshot is suspiciously small (${SNAP_SIZE} bytes)"
          fi

      - name: Run scraper
        run: python scraper.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-failure:
    needs: [scrape, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'workflow-failure',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Calendar update workflow failed',
                body: `Workflow run failed at ${new Date().toISOString()}\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['workflow-failure']
              });
            }
