name: Process Snack Signups

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: >-
      github.event.comment.body == '/approve' &&
      github.event.issue.state == 'open' &&
      startsWith(github.event.issue.title, '[Snacks]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process snack signup
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python process_snacks_issue.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "Snack signup from issue #${{ github.event.issue.number }}" && git push)

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title || '';
            const isSwap = title.includes('[Snacks] Swap');
            const msg = isSwap
              ? 'Snack swap approved and applied! The schedule will update on the next run.'
              : 'Snack signup applied! It will appear on the calendar on the next scheduled run.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
