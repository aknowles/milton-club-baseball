name: Process Snack Signups

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  process:
    if: >-
      github.event.comment.body == '/approve' &&
      github.event.issue.state == 'open' &&
      startsWith(github.event.issue.title, '[Snacks]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process snack signup
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python process_snacks_issue.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Snack update from issue #${{ github.event.issue.number }}"
          # Retry push with rebase in case remote moved ahead
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed, rebasing and retrying ($i/3)..."
            sleep 2
            git pull --rebase origin main
          done
          echo "ERROR: Push failed after 3 retries"
          exit 1

      - name: Trigger calendar rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-calendar.yml',
              ref: 'main'
            });

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title || '';
            const isSwap = title.includes('[Snacks] Swap');
            const msg = isSwap
              ? 'Snack swap approved and applied! The schedule will update on the next run.'
              : 'Snack signup applied! It will appear on the calendar on the next scheduled run.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
