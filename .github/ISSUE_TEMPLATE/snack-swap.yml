name: Snack Swap
description: Take over another family's lunch/snack day, with or without a return swap
title: "[Snacks] Swap: "
labels: ["snack-swap"]
body:
  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - MDB Knights 11U Gold
        - MDB Knights 14U Blue
        - MDB Knights 11U Blue
        - Braintree Bandits 11U Mercado
    validations:
      required: true
  - type: input
    id: family
    attributes:
      label: Your Family Name
      placeholder: "Knowles"
    validations:
      required: true
  - type: input
    id: swap_to_date
    attributes:
      label: Date
      description: "The date you are taking on. Format: YYYY-MM-DD"
      placeholder: "2026-04-18"
    validations:
      required: true
  - type: input
    id: swap_with_family
    attributes:
      label: Replacing
      description: "The family you are replacing on that date"
      placeholder: "Phillips"
    validations:
      required: true
  - type: input
    id: current_date
    attributes:
      label: They Take Your Date
      description: "If they're taking one of your dates in return, enter it here. Leave blank for a one-way takeover. Format: YYYY-MM-DD"
      placeholder: "2026-03-28 (or leave blank)"
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: "Any additional context (e.g. reason for swap)"
      placeholder: "Phillips can't make the April 18 game"
    validations:
      required: false
