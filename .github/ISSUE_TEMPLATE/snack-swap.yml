name: Snack Swap
description: Request to swap your assigned lunch/snack day with another family, or transfer to a different date
title: "[Snacks] Swap: "
labels: ["snack-swap"]
body:
  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - MDB Knights 11U Gold
        - MDB Knights 14U Blue
        - MDB Knights 11U Blue
        - Braintree Bandits 11U Mercado
    validations:
      required: true
  - type: input
    id: family
    attributes:
      label: Family Name
      description: "Your family name (the family requesting the swap)"
      placeholder: "Smith"
    validations:
      required: true
  - type: input
    id: current_date
    attributes:
      label: Give Up Date
      description: "The date you are giving up. Leave blank if you're taking on an extra day without giving one up. Format: YYYY-MM-DD"
      placeholder: "2026-04-12 (or leave blank)"
    validations:
      required: false
  - type: input
    id: swap_to_date
    attributes:
      label: Take On Date
      description: "The date you want to take on. Format: YYYY-MM-DD"
      placeholder: "2026-04-19"
    validations:
      required: true
  - type: input
    id: swap_with_family
    attributes:
      label: Replace Family
      description: "The family you're replacing on the target date. Leave blank to join that date without removing anyone."
      placeholder: "Jones (or leave blank)"
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: "Any additional context (e.g. reason for swap)"
      placeholder: "Can't make the April 12 game due to a conflict"
    validations:
      required: false
