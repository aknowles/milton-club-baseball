name: Snack Swap
description: Request to swap your assigned lunch/snack day with another family, or transfer to a different date
title: "[Snacks] Swap: "
labels: ["snack-swap"]
body:
  - type: dropdown
    id: team
    attributes:
      label: Team
      options:
        - MDB Knights 11U Gold
        - MDB Knights 14U Blue
        - MDB Knights 11U Blue
        - Braintree Bandits 11U Mercado
    validations:
      required: true
  - type: input
    id: family
    attributes:
      label: Family Name
      description: "Your family name (the family requesting the swap)"
      placeholder: "Smith"
    validations:
      required: true
  - type: input
    id: current_date
    attributes:
      label: Currently Assigned Date
      description: "The date you are currently assigned to. Format: YYYY-MM-DD"
      placeholder: "2026-04-12"
    validations:
      required: true
  - type: input
    id: swap_to_date
    attributes:
      label: Swap To Date
      description: "The date you want to swap to. Format: YYYY-MM-DD"
      placeholder: "2026-04-19"
    validations:
      required: true
  - type: input
    id: swap_with_family
    attributes:
      label: Swap With Family
      description: "The family assigned to the target date that you want to swap with. Leave blank for a one-way transfer (you move dates, no return swap)."
      placeholder: "Jones (or leave blank for one-way transfer)"
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: "Any additional context (e.g. reason for swap)"
      placeholder: "Can't make the April 12 game due to a conflict"
    validations:
      required: false
